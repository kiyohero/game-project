<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アキネーター風どうぶつあてゲーム</title>
  <link rel="stylesheet" href="common.css">
  <script src="common.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px 24px;
    }

    #game-container {
      width: 100%;
      max-width: 480px;
    }

    .screen {
      display: none;
      animation: fadeIn 0.35s ease;
    }
    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 28px 24px 32px;
      text-align: center;
    }

    /* Start screen */
    .start-emoji {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 16px;
    }
    .start-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #5a3d7a;
      margin-bottom: 10px;
    }
    .start-desc {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* Progress bar */
    .progress-wrap {
      background: #eee;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #8b6fa8, #667eea);
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
    }

    /* Question text */
    .question-num {
      font-size: 0.85rem;
      color: #8b6fa8;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .question-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #333;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .candidates-label {
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 26px;
    }

    /* Answer buttons */
    .answer-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 4px;
    }
    .btn-answer {
      min-height: 64px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 6px;
    }
    .btn-answer:active { transform: scale(0.95); }
    .btn-answer .btn-sub {
      font-size: 0.72rem;
      font-weight: 400;
      opacity: 0.85;
    }
    .btn-yes  { background: #4caf50; }
    .btn-no   { background: #f44336; }
    .btn-prob { background: #ff9800; }
    .btn-dk   { background: #9e9e9e; }

    .btn-yes:hover  { background: #43a047; }
    .btn-no:hover   { background: #e53935; }
    .btn-prob:hover { background: #fb8c00; }
    .btn-dk:hover   { background: #757575; }

    /* Primary button */
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, #8b6fa8, #667eea);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px 40px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 14px rgba(102,126,234,0.45);
    }
    .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(102,126,234,0.5); }
    .btn-primary:active { transform: scale(0.96); }

    /* Guess screen */
    .guess-emoji {
      font-size: 6rem;
      line-height: 1;
      margin-bottom: 10px;
    }
    .guess-name {
      font-size: 2rem;
      font-weight: 800;
      color: #5a3d7a;
      margin-bottom: 8px;
    }
    .guess-hint {
      font-size: 0.95rem;
      color: #777;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .guess-question {
      font-size: 1.1rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 24px;
    }
    .guess-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-correct {
      min-height: 60px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }
    .btn-wrong {
      min-height: 60px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }
    .btn-correct:active, .btn-wrong:active { transform: scale(0.95); }

    /* Result correct */
    .result-emoji {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 12px;
    }
    .result-title-correct {
      font-size: 1.7rem;
      font-weight: 800;
      color: #e6a800;
      margin-bottom: 10px;
    }
    .result-title-wrong {
      font-size: 1.5rem;
      font-weight: 800;
      color: #888;
      margin-bottom: 10px;
    }
    .result-detail {
      font-size: 1rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .result-stars {
      font-size: 2rem;
      margin-bottom: 14px;
      letter-spacing: 4px;
    }
    .confetti-wrap {
      position: relative;
    }

    /* Ripple animation for correct */
    @keyframes pop {
      0%   { transform: scale(0.8); opacity: 0; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .result-pop {
      animation: pop 0.5s ease forwards;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }

    /* Responsive: wider screens */
    @media (min-width: 500px) {
      body { padding-top: 72px; }
      .card { padding: 36px 36px 40px; }
    }
  </style>
</head>
<body>
  <div id="game-container">

    <!-- ===== START SCREEN ===== -->
    <div id="screen-start" class="screen active">
      <div class="card">
        <div class="start-emoji">🔮</div>
        <div class="start-title">どうぶつあてゲーム</div>
        <p class="start-desc">
          どうぶつを1ひき思い浮かべてね！<br>
          「はい」「いいえ」で答えていくと、<br>
          考えている動物をあてるよ！
        </p>
        <button class="btn-primary" id="btn-start" disabled>スタート！</button>
      </div>
    </div>

    <!-- ===== QUESTION SCREEN ===== -->
    <div id="screen-question" class="screen">
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-label">
          <span id="progress-text">0 / 20</span>
          <span id="candidates-label" class="candidates-label"></span>
        </div>
        <div class="question-num" id="question-num">しつもん 1</div>
        <div class="question-text" id="question-text"></div>
        <div class="answer-buttons">
          <button class="btn-answer btn-yes"  data-ans="yes">
            はい
            <span class="btn-sub">Yes</span>
          </button>
          <button class="btn-answer btn-no"   data-ans="no">
            いいえ
            <span class="btn-sub">No</span>
          </button>
          <button class="btn-answer btn-prob" data-ans="prob">
            たぶんそう
            <span class="btn-sub">Maybe</span>
          </button>
          <button class="btn-answer btn-dk"   data-ans="dk">
            わからない
            <span class="btn-sub">Don't know</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== GUESS SCREEN ===== -->
    <div id="screen-guess" class="screen">
      <div class="card">
        <div class="guess-emoji" id="guess-emoji"></div>
        <div class="guess-name"  id="guess-name"></div>
        <div class="guess-hint"  id="guess-hint"></div>
        <hr class="divider">
        <div class="guess-question">これですか？</div>
        <div class="guess-buttons">
          <button class="btn-correct" id="btn-correct">せいかい！✨</button>
          <button class="btn-wrong"   id="btn-wrong">ちがう...</button>
        </div>
      </div>
    </div>

    <!-- ===== RESULT SCREEN ===== -->
    <div id="screen-result" class="screen">
      <div class="card confetti-wrap" id="result-card">
        <div class="result-pop">
          <div class="result-emoji" id="result-emoji"></div>
          <div id="result-title"></div>
          <div class="result-stars" id="result-stars"></div>
          <div class="result-detail" id="result-detail"></div>
        </div>
        <button class="btn-primary" id="btn-again">もう一度あそぶ</button>
      </div>
    </div>

  </div><!-- /game-container -->

  <script>
  (function () {
    'use strict';

    // ===== State =====
    let questions = [];
    let items = [];
    let candidates = [];
    let usedQuestions = new Set();
    let currentQ = -1;
    let questionsAsked = 0;

    // ===== Screens =====
    const screens = {
      start:    document.getElementById('screen-start'),
      question: document.getElementById('screen-question'),
      guess:    document.getElementById('screen-guess'),
      result:   document.getElementById('screen-result'),
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    // ===== Load data =====
    fetch('akinator-data.json')
      .then(r => r.json())
      .then(data => {
        questions = data.questions;
        items     = data.items;
        // Enable start button
        document.getElementById('btn-start').disabled = false;
      })
      .catch(() => {
        alert('データの読み込みに失敗しました。ページを再読み込みしてください。');
      });

    // ===== Button listeners =====
    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-correct').addEventListener('click', onCorrect);
    document.getElementById('btn-wrong').addEventListener('click', onWrong);
    document.getElementById('btn-again').addEventListener('click', startGame);

    document.querySelectorAll('.btn-answer').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn.dataset.ans));
    });

    // ===== Game logic =====

    function startGame() {
      candidates    = items.slice(); // copy
      usedQuestions = new Set();
      questionsAsked = 0;
      showScreen('question');
      nextQuestion();
    }

    function getBestQuestion(cands) {
      let bestQ = -1;
      let bestScore = -1;

      for (let q = 0; q < questions.length; q++) {
        if (usedQuestions.has(q)) continue;

        const yesCount = cands.filter(item => item.attrs[q]).length;
        const ratio    = yesCount / cands.length;
        // Score: how close to 0.5 (maximises information)
        const score    = 1 - Math.abs(ratio - 0.5) * 2;

        if (score > bestScore) {
          bestScore = score;
          bestQ = q;
        }
      }
      return bestQ;
    }

    function nextQuestion() {
      // Check stop conditions
      if (candidates.length === 0) {
        showGiveUp();
        return;
      }
      if (candidates.length === 1) {
        showGuess(candidates[0]);
        return;
      }
      if (questionsAsked >= 20) {
        showGuess(candidates[0]);
        return;
      }

      currentQ = getBestQuestion(candidates);
      if (currentQ === -1) {
        // No more useful questions
        showGuess(candidates[0]);
        return;
      }

      updateQuestionUI();
    }

    function updateQuestionUI() {
      const pct = Math.round((questionsAsked / 20) * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = questionsAsked + ' / 20';
      document.getElementById('candidates-label').textContent =
        'のこり' + candidates.length + 'ひき';
      document.getElementById('question-num').textContent =
        'しつもん ' + (questionsAsked + 1);
      document.getElementById('question-text').textContent = questions[currentQ];
    }

    function handleAnswer(ans) {
      usedQuestions.add(currentQ);
      questionsAsked++;

      if (ans === 'yes' || ans === 'prob') {
        candidates = candidates.filter(item => item.attrs[currentQ] === true);
      } else if (ans === 'no') {
        candidates = candidates.filter(item => item.attrs[currentQ] === false);
      }
      // 'dk' → no filter

      nextQuestion();
    }

    // ===== Guess screen =====
    function showGuess(animal) {
      document.getElementById('guess-emoji').textContent = animal.emoji;
      document.getElementById('guess-name').textContent  = animal.name;
      document.getElementById('guess-hint').textContent  = animal.hint;
      showScreen('guess');
    }

    function onCorrect() {
      showResultCorrect();
    }

    function onWrong() {
      // Remove the guessed animal and try again
      const guessedName = document.getElementById('guess-name').textContent;
      candidates = candidates.filter(a => a.name !== guessedName);

      if (candidates.length === 0) {
        showGiveUp();
        return;
      }

      // Try next best candidate without asking more questions
      showGuess(candidates[0]);
    }

    // ===== Result screens =====
    function showResultCorrect() {
      document.getElementById('result-emoji').textContent =
        document.getElementById('guess-emoji').textContent;

      document.getElementById('result-title').innerHTML =
        '<div class="result-title-correct">せいかい！🎉</div>';

      // Stars based on questionsAsked
      const stars = questionsAsked <= 5  ? '⭐⭐⭐' :
                    questionsAsked <= 10 ? '⭐⭐' : '⭐';
      document.getElementById('result-stars').textContent = stars;

      const animalName = document.getElementById('guess-name').textContent;
      document.getElementById('result-detail').innerHTML =
        '<strong>' + animalName + '</strong>を当てたよ！<br>' +
        questionsAsked + 'もんで当てることができました！';

      showScreen('result');
    }

    function showGiveUp() {
      document.getElementById('result-emoji').textContent = '😅';
      document.getElementById('result-title').innerHTML =
        '<div class="result-title-wrong">わかりませんでした...</div>';
      document.getElementById('result-stars').textContent = '';
      document.getElementById('result-detail').textContent =
        'むずかしかった！また挑戦してみてね。';
      showScreen('result');
    }

  })();
  </script>
</body>
</html>
