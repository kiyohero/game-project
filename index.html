<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f0fa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px 10px; }
    h1 { font-size: 1.6rem; color: #6b5b7a; margin-bottom: 12px; }
    .game-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; }
    .game-card {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #a78bbd, #8b6fa8);
      border-radius: 14px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.2s;
      box-shadow: 0 2px 8px rgba(107, 91, 122, 0.25);
    }
    .game-card:hover { transform: scale(1.05); }
    .game-card:active { transform: scale(0.95); }
    .game-icon { font-size: 2.2rem; line-height: 1; }
    .game-card span:last-child { color: #fff; font-size: 0.78rem; font-weight: 600; text-align: center; padding: 0 4px; line-height: 1.2; }
  </style>
</head>
<body>
  <h1>ゲーム</h1>
  <div class="game-list">
    <a href="games/2048.html" class="game-card">
      <span class="game-icon">🔢</span>
      <span>2048</span>
    </a>
    <a href="games/tic-tac-toe.html" class="game-card">
      <span class="game-icon">⭕</span>
      <span>マルバツ</span>
    </a>
    <a href="games/invader.html" class="game-card">
      <span class="game-icon">👾</span>
      <span>インベーダー</span>
    </a>
    <a href="games/reversi.html" class="game-card">
      <span class="game-icon">⚫</span>
      <span>リバーシ</span>
    </a>
    <a href="games/shogi.html" class="game-card">
      <span class="game-icon">♟️</span>
      <span>将棋</span>
    </a>
    <a href="games/pokemon-shiritori.html" class="game-card">
      <span class="game-icon">⚡</span>
      <span>ポケモン<br>しりとり</span>
    </a>
    <a href="games/nonogram.html" class="game-card">
      <span class="game-icon">🎨</span>
      <span>お絵かき<br>ロジック</span>
    </a>
    <a href="games/sliding-puzzle.html" class="game-card">
      <span class="game-icon">🧩</span>
      <span>スライド<br>パズル</span>
    </a>
    <a href="games/werewolf.html" class="game-card">
      <span class="game-icon">🐺</span>
      <span>人狼ゲーム</span>
    </a>
<a href="games/crossword.html" class="game-card">
      <span class="game-icon">🔤</span>
      <span>クロス<br>ワード</span>
    </a>
    <a href="games/barcode-battle.html" class="game-card">
      <span class="game-icon">📱</span>
      <span>バーコード<br>バトル</span>
    </a>
    <a href="games/investment-game.html" class="game-card">
      <span class="game-icon">📈</span>
      <span>投資シミュ<br>レーター</span>
    </a>
    <a href="games/memory-game.html" class="game-card">
      <span class="game-icon">🧠</span>
      <span>神経衰弱</span>
    </a>
  </div>
  <script>
    // 最近プレイしたゲームを上に表示
    (function() {
      try {
        const history = JSON.parse(localStorage.getItem('gameHistory') || '{}');
        const gameList = document.querySelector('.game-list');
        const cards = Array.from(gameList.querySelectorAll('.game-card'));

        // アクセス履歴でソート（新しい順）
        cards.sort((a, b) => {
          const fileA = a.href.split('/').pop();
          const fileB = b.href.split('/').pop();
          const timeA = history[fileA] || 0;
          const timeB = history[fileB] || 0;
          return timeB - timeA;
        });

        // 並び替えたカードを再挿入
        cards.forEach(card => gameList.appendChild(card));
      } catch (e) {}
    })();
  </script>
</body>
</html>
